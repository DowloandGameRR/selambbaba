<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Savaş Arenası 2D - Turnuva Sürümü</title>
    <link rel="stylesheet" href="style.css">
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>

    <div class="bg-animate"></div>

    <button id="settingsBtn" class="icon-btn">⚙️</button>

    <div id="settingsModal" class="modal hidden">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <h2>⚙️ AYARLAR</h2>
            <div class="setting-item">
                <label for="settingVolume">Oyun Sesi:</label>
                <button id="settingVolume" class="btn btn-secondary">Açık (Mute)</button>
            </div>
            <div class="setting-item">
                <label for="settingColor">Karakter Rengini Değiştir:</label>
                <input type="color" id="settingColor" value="#00ffcc">
            </div>
            <div class="credits-bottom">Created by Rüzgar</div>
        </div>
    </div>

    <div id="loginScreen" class="container">
        <h1 class="neon-text">SAVAŞ ARENASI</h1>
        <div class="card">
            <div class="input-group">
                <label>Kullanıcı Adın</label>
                <input type="text" id="usernameInput" placeholder="Savaşçı Adı giriniz..." maxlength="15">
            </div>
            <div class="room-actions">
                <div class="box">
                    <h3>Oda Oluştur</h3>
                    <input type="text" id="newRoomName" placeholder="Oda Adı">
                    <input type="password" id="newRoomPass" placeholder="Şifre (İsteğe bağlı)">
                    <button id="createRoomBtn" class="btn btn-primary">Odayı Kur</button>
                </div>
                <div class="box">
                    <h3>Aktif Odalar</h3>
                    <div id="roomListContainer" class="scroll-box">
                        <p class="empty-text">Aktif oda bulunamadı.</p>
                    </div>
                </div>
            </div>
        </div>
        <div class="footer-signature">Created by Rüzgar</div>
    </div>

    <div id="lobbyScreen" class="container hidden">
        <h1 id="lobbyTitle" class="neon-text">ODA LOBİSİ</h1>
        <div class="card lobby-card">
            <div class="players-list-section">
                <h3>Odadaki Oyuncular</h3>
                <div id="playerList" class="player-grid"></div>
            </div>
            <div class="lobby-controls">
                <button id="startGameBtn" class="btn btn-success hidden">Oyunu Başlat</button>
                <button id="leaveRoomBtn" class="btn id-danger">Odadan Çık</button>
            </div>
        </div>
    </div>

    <div id="gameScreen" class="hidden">
        <div id="uiContainer">
            <div id="scoreBoard">Skorlar yüklenecektir...</div>
        </div>
        <canvas id="gameCanvas" width="1000" height="600"></canvas>
    </div>

    <div id="chatWrapper" class="chat-wrapper hidden">
        <div id="chatBox" class="chat-box"></div>
        <div class="chat-input-area">
            <input type="text" id="chatInput" placeholder="Mesaj yazmak için 'Enter'a basın..." maxlength="60">
        </div>
    </div>

    <div id="gameOverScreen" class="popup-overlay hidden">
        <div class="popup-box">
            <h2 id="winnerText" class="neon-text-red">ZAFER!</h2>
            <p>Oda lobisine geri dönülüyor, tekrar kapışmaya hazır olun...</p>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
